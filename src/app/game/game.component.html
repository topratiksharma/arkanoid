<div class="arkanoid">
  <div class="arkanoid__header">
    <div class="arkanoid__brand">
      <span class="arkanoid__eyebrow">Classic Arcade</span>
      <h1 class="arkanoid__title">Pong</h1>
    </div>
    <mat-slide-toggle
      class="arkanoid__toggle-mode"
      color="primary"
      hideIcon
      [(ngModel)]="isTwoPlayerMode"
      (change)="onPlayingModeChange()"
    >
      <span class="arkanoid__toggle-label">Vs Player 2</span>
    </mat-slide-toggle>
  </div>

  <div class="arkanoid__scoreboard">
    <div class="arkanoid__player-score">
      <div class="arkanoid__player-name">Player 1</div>
      <div class="arkanoid__score-value">{{ player1Score }}</div>
    </div>
    <div class="arkanoid__player-score arkanoid__player-score--right">
      <div class="arkanoid__player-name">
        {{ isTwoPlayerMode ? "Player 2" : "AI" }}
      </div>
      <div class="arkanoid__score-value">{{ player2Score }}</div>
    </div>
  </div>

  <div class="arkanoid__game-container">
    <canvas
      #gameCanvas
      class="arkanoid__game"
      width="{{ width }}"
      height="{{ height }}"
    ></canvas>
  </div>

  <div class="arkanoid__controls">
    <button
      class="arkanoid__button arkanoid__button--primary"
      (click)="isPlaying && !isPaused ? pauseGame() : isPaused ? resumeGame() : playGame()"
    >
      <mat-icon>{{ isPlaying && !isPaused ? 'pause' : 'play_arrow' }}</mat-icon>
      {{ isPlaying && !isPaused ? 'Pause' : isPaused ? 'Resume' : 'Play' }}
    </button>

    <div class="arkanoid__cockpit">
      <div class="arkanoid__stepper">
        <span class="arkanoid__stepper-label arkanoid__stepper-label--cyan">Speed</span>
        <div class="arkanoid__stepper-track">
          <button class="arkanoid__stepper-btn" (click)="decreaseBallSpeed()" [disabled]="ballSpeed <= 1">−</button>
          <span class="arkanoid__stepper-value arkanoid__stepper-value--cyan">{{ ballSpeed }}</span>
          <button class="arkanoid__stepper-btn" (click)="increaseBallSpeed()">+</button>
        </div>
      </div>
      <div class="arkanoid__cockpit-divider"></div>
      <div class="arkanoid__stepper">
        <span class="arkanoid__stepper-label arkanoid__stepper-label--pink">Balls</span>
        <div class="arkanoid__stepper-track">
          <button class="arkanoid__stepper-btn arkanoid__stepper-btn--pink" (click)="decreaseBallCount()" [disabled]="ballCount <= 1">−</button>
          <span class="arkanoid__stepper-value arkanoid__stepper-value--pink">{{ ballCount }}</span>
          <button class="arkanoid__stepper-btn arkanoid__stepper-btn--pink" (click)="increaseBallCount()">+</button>
        </div>
      </div>
    </div>

    <button
      class="arkanoid__button arkanoid__button--secondary"
      (click)="resetPlayground()"
    >
      <mat-icon>restart_alt</mat-icon>
      Reset
    </button>
  </div>
  <ark-footer />
</div>
