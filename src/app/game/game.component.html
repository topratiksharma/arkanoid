<div class="arkanoid">
  <div class="arkanoid__header">
    <div class="arkanoid__brand">
      <span class="arkanoid__eyebrow">Classic Arcade</span>
      <h1 class="arkanoid__title">Pong</h1>
    </div>
    <mat-slide-toggle
      class="arkanoid__toggle-mode"
      color="primary"
      hideIcon
      [(ngModel)]="isTwoPlayerMode"
      (change)="onPlayingModeChange()"
    >
      <span class="arkanoid__toggle-label">Vs Player 2</span>
    </mat-slide-toggle>
  </div>

  <div class="arkanoid__scoreboard">
    <div class="arkanoid__player-score">
      <div class="arkanoid__player-name">Player 1</div>
      <div class="arkanoid__score-value">{{ player1Score }}</div>
    </div>
    <div class="arkanoid__player-score arkanoid__player-score--right">
      <div class="arkanoid__player-name">
        {{ isTwoPlayerMode ? "Player 2" : "AI" }}
      </div>
      <div class="arkanoid__score-value">{{ player2Score }}</div>
    </div>
  </div>

  <div class="arkanoid__game-container">
    <canvas
      #gameCanvas
      class="arkanoid__game"
      width="{{ width }}"
      height="{{ height }}"
    ></canvas>
  </div>

  <div class="arkanoid__controls">
    <div class="arkanoid__play-cell">
      <button
        class="arkanoid__btn-play"
        (click)="
          isPlaying && !isPaused
            ? pauseGame()
            : isPaused
            ? resumeGame()
            : playGame()
        "
      >
        <mat-icon>{{
          isPlaying && !isPaused ? "pause" : "play_arrow"
        }}</mat-icon>
        {{ isPlaying && !isPaused ? "Pause" : isPaused ? "Resume" : "Play" }}
      </button>
    </div>

    <div class="arkanoid__vol-widget">
      <span class="arkanoid__vol-label">Speed</span>
      <div class="arkanoid__vol-bar">
        @for (seg of speedSegments; track seg) {
          <button
            class="arkanoid__vol-seg"
            [class.arkanoid__vol-seg--active]="ballSpeed >= seg"
            [style.height.px]="8 + seg * 3"
            [attr.aria-label]="'Set speed to ' + seg"
            (click)="setSpeed(seg)"
          ><span class="arkanoid__sr-only">{{ seg }}</span></button>
        }
      </div>
      <span class="arkanoid__vol-value">{{ ballSpeed }}/10</span>
    </div>

    <div class="arkanoid__ball-ctrl">
      <span class="arkanoid__ball-ctrl-label">Balls</span>
      <div class="arkanoid__ball-ctrl-track">
        <button
          class="arkanoid__ball-ctrl-dec"
          (click)="decreaseBallCount()"
          [disabled]="ballCount <= 1"
        >
          -
        </button>
        <span class="arkanoid__ball-ctrl-value">{{ ballCount }}</span>
        <button class="arkanoid__ball-ctrl-add" (click)="increaseBallCount()">
          +
        </button>
      </div>
    </div>
    <div class="arkanoid__reset-cell">
      <button class="arkanoid__btn-reset" (click)="resetPlayground()">
        <mat-icon>restart_alt</mat-icon>
        Reset
      </button>
    </div>
  </div>
  <ark-footer />
</div>
